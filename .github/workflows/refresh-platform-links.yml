name: Refresh Platform Links

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-platform-links
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh platform links
        run: node scripts/build-platform-links.mjs

      - name: Commit updated links
        run: |
          if git diff --quiet -- data/platform-links.json; then
            echo "No platform link updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/platform-links.json
          git commit -m "Refresh episode platform links"
          git push
