<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloody Water Podcast</title>
    <meta
      name="description"
      content="Bloody Water Podcast is your fight-week home for UFC breakdowns, sharp betting angles, sleeper picks, and the full episode archive."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Inter:wght@400;600;700;800;900&family=Inter+Tight:wght@800;900&family=JetBrains+Mono:wght@500;700&family=Oxanium:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Syncopate:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260408-mobile-tagline" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="./index.html" aria-label="Bloody Water Podcast home">Bloody Water Podcast</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="#archive">Episodes</a>
          <a href="./about.html">About</a>
        </nav>
      </header>

      <main id="top">
        <section class="landing-view" id="landing-view">
          <div class="landing-inner">
            <section class="landing-stage">
              <div class="landing-brand-block">
                <img class="landing-logo" src="./assets/logo-dark.png" alt="Bloody Water Podcast logo" />
              </div>
              <div class="landing-copy">
                <h1 class="landing-headline">Your favorite fighter's favorite fight show!</h1>
                <p class="landing-summary">Sleepers &middot; Picks &middot; Best Bets &middot; Every Week</p>
              </div>
            </section>

            <div class="entry-grid">
              <article class="entry-card entry-card-recent" id="recent-entry-card">
                <span class="entry-label">Recent Episode</span>
                <div class="entry-copy" id="recent-entry-copy"></div>
              </article>

              <a class="entry-card entry-card-archive" href="#archive">
                <span class="entry-label">All Episodes</span>
              </a>
            </div>

            <section class="platform-cta-band" aria-label="Listen to Bloody Water Podcast">
              <a
                class="platform-cta"
                href="https://www.youtube.com/@BloodyWaterPodcast"
                target="_blank"
                rel="noreferrer"
                aria-label="Watch Bloody Water Podcast on YouTube"
              >
                <img class="platform-cta-badge platform-cta-badge-youtube" src="./assets/youtube-logo-white.png" alt="YouTube" />
              </a>

              <a
                class="platform-cta"
                href="https://open.spotify.com/show/0GATqczYoMsnlcdYS1bvGX"
                target="_blank"
                rel="noreferrer"
                aria-label="Listen to Bloody Water Podcast on Spotify"
              >
                <img class="platform-cta-badge platform-cta-badge-spotify" src="./assets/spotify-logo-white.svg" alt="Spotify" />
              </a>

              <a
                class="platform-cta"
                href="https://podcasts.apple.com/us/podcast/bloody-water-podcast/id1554157578"
                target="_blank"
                rel="noreferrer"
                aria-label="Listen to Bloody Water Podcast on Apple Podcasts"
              >
                <img class="platform-cta-badge platform-cta-badge-apple" src="./assets/apple-podcasts-logo-white.svg" alt="Apple Podcasts" />
              </a>
            </section>

            <section class="review-band" aria-labelledby="review-band-title">
              <span class="review-band-stars" aria-hidden="true">★★★★★</span>
              <div class="review-band-copy">
                <h2 class="review-band-title" id="review-band-title">Did our picks deliver?</h2>
                <p class="review-band-subline">Rate us five stars.</p>
              </div>
              <a class="review-band-button" href="./rate.html">Rate The Show</a>
            </section>

          </div>
        </section>

        <section class="archive-view is-hidden" id="archive-view">
          <div class="archive-hero">
            <div class="archive-hero-row">
              <div class="archive-title-block">
                <p class="archive-kicker">Bloody Water Podcast</p>
                <h1 class="archive-title">Available Episodes</h1>
              </div>
              <label class="archive-search" for="archive-search-input">
                <span class="visually-hidden">Search episodes</span>
                <input
                  id="archive-search-input"
                  type="search"
                  placeholder="Search"
                  autocomplete="off"
                />
              </label>
            </div>
          </div>

          <div class="archive-grid-shell">
            <p class="archive-status" id="archive-status">Loading episodes from RedCircle...</p>
            <div class="archive-list" id="archive-grid"></div>
          </div>
        </section>

        <section class="episode-detail-view is-hidden" id="episode-detail-view">
          <article class="episode-detail-card" id="episode-detail-card"></article>
        </section>
      </main>
    </div>

    <script src="./script.js?v=20260406-rating-badge"></script>
  </body>
</html>
